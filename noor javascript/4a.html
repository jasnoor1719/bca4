<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .highlight {
            color: blue;
            background-color: cyan;
            padding: 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Using "div, p and span tags"</h1>

        <p>
            This is a paragraph inside a <code>&lt;div&gt;</code>.
            Divs are used to group together.
        </p>

        <span class="highlight">
            This is highlighted span element inside the div
        </span>

        <div>
            <p>
                Another example of a <code>&lt;div&gt;</code>
                containing a paragraph and a span.
            </p>

            <p>
                Here is some inline text with a
                <span class="highlight">span styled to stand out</span>
            </p>
        </div>
    </div>

</body>
</html>
